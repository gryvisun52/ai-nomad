<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI NOMAD: FINAL TOWER EDITION</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --pink: #ff0055; --cyan: #00f2ff; --gold: #ffcc00; --bg: #050505; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: var(--bg); color: white; font-family: 'Orbitron', sans-serif; overflow: hidden; position: fixed; }

        .screen { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: flex-start; padding: 15px; padding-top: env(safe-area-inset-top, 20px); text-align: center; overflow-y: auto; z-index: 5; }
        #reg-screen { display: flex; background: #000; z-index: 100; justify-content: center; }
        #hub { background: radial-gradient(circle, #111 0%, #000 100%); }

        input { background: #111; border: 1px solid var(--pink); color: white; padding: 12px; border-radius: 8px; text-align: center; margin: 10px; width: 80%; max-width: 300px; font-family: 'Orbitron'; }
        button { background: var(--pink); border: none; color: white; padding: 8px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-family: 'Orbitron'; font-size: 9px; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        button:disabled { opacity: 0.3; filter: grayscale(1); }
        
        .panel { background: rgba(20,20,20,0.95); padding: 10px; border-radius: 12px; border: 1px solid #333; width: 100%; max-width: 450px; margin-bottom: 8px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .card { background: #111; padding: 8px; border-radius: 8px; border: 1px solid #333; font-size: 8px; display: flex; flex-direction: column; gap: 4px; }
        
        .mine-box { width: 100%; background: #000; border-radius: 10px; padding: 10px; border: 1px solid #222; }
        .bar-bg { background: #111; height: 12px; border-radius: 6px; overflow: hidden; margin: 5px 0; }
        #mine-fill { height: 100%; background: var(--cyan); width: 0%; box-shadow: 0 0 10px var(--cyan); }

        .skin-select { display: flex; gap: 8px; justify-content: center; margin-top: 5px; flex-wrap: wrap; }
        .skin-btn { width: 65px; height: 75px; border: 2px solid #333; border-radius: 8px; background-size: 30px; background-repeat: no-repeat; background-position: center 10px; cursor: pointer; background-color: #111; font-size: 7px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 5px; }
        .skin-btn.active { border-color: var(--cyan); box-shadow: 0 0 10px var(--cyan); }
        .skin-btn.leg-s { border-color: var(--gold); }
        .skin-btn.owned::after { content: '✅'; position: absolute; top: -5px; right: -5px; font-size: 10px; }

        #gameCanvas { display: none; width: 100%; height: 100%; touch-action: none; position: fixed; z-index: 1; }
        #battle-ui { position: absolute; inset: 0; pointer-events: none; z-index: 10; display: none; }
        #battle-top { position: absolute; top: env(safe-area-inset-top, 15px); width: 100%; display: flex; justify-content: space-around; align-items: center; }
        .hp-cont { width: 30vw; height: 10px; background: #222; border-radius: 5px; border: 1px solid #444; overflow: hidden; }
        .hp-fill { height: 100%; background: var(--cyan); width: 100%; transition: width 0.3s; }
        
        #weaponDock { position: absolute; bottom: calc(20px + env(safe-area-inset-bottom, 0px)); left: 50%; transform: translateX(-50%); display: flex; gap: 8px; pointer-events: auto; }
        .w-btn { width: 60px; height: 65px; background: rgba(0,0,0,0.8); border: 2px solid #333; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; position: relative; }
        .w-btn.active { border-color: var(--cyan); box-shadow: 0 0 10px var(--cyan); }
        .w-btn.leg { border-color: var(--gold); box-shadow: 0 0 10px var(--gold); }
        .w-cost { font-size: 7px; color: #888; font-style: normal; margin-top: 2px; font-family: 'Orbitron'; }
        #roulette-result { font-size: 10px; color: var(--gold); margin-top: 5px; height: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="reg-screen" class="screen">
        <h2 style="color:var(--pink)">AI NOMAD</h2>
        <input type="text" id="reg-input" placeholder="НИКНЕЙМ" maxlength="10">
        <button onclick="register()">ВОЙТИ В СЕТЬ</button>
    </div>

    <div id="hub" class="screen">
        <h3 id="user-tag" style="color:var(--cyan); margin: 5px 0;">PILOT</h3>
        <p id="tower-title" style="color:var(--pink); font-size: 10px; margin-bottom: 5px;">БАШНЯ 1</p>
        
        <div class="panel">
            <div style="display:flex; justify-content: space-around; font-size: 14px;">
                <span style="color:gold">💰 <span id="gold-val">0</span></span>
                <span style="color:var(--cyan)">💎 <span id="chip-val">0</span></span>
            </div>
            <button onclick="goBattle()" style="width:100%; margin-top:8px; padding: 12px; background:var(--cyan); color:#000; font-size: 12px;">В БОЙ</button>
        </div>

        <div class="panel" style="border-color: var(--gold);">
            <p style="font-size: 9px; color: var(--gold);">КВАНТОВАЯ РУЛЕТКА</p>
            <div id="roulette-result">ЖМИТЕ SPIN!</div>
            <button onclick="spinRoulette()" id="spin-btn" style="width:100%; margin-top:5px; background: linear-gradient(45deg, #444, #222); border: 1px solid var(--gold);">SPIN (5000💰)</button>
        </div>

        <div class="panel">
            <p style="font-size: 9px; color: var(--pink); margin-bottom: 5px;">ЭКИПИРОВКА</p>
            <div class="skin-select">
                <div class="skin-btn active owned" id="s0" onclick="buySkin(0, 0)" style="background-image: url('https://img.icons8.com/?size=100&id=59023&format=png&color=000000')">FREE</div>
                <div class="skin-btn" id="s1" onclick="buySkin(1, 3000)" style="background-image: url('https://img.icons8.com/?size=100&id=sQ8d3BxweuhA&format=png&color=000000')">3000💰</div>
                <div class="skin-btn" id="s2" onclick="buySkin(2, 250000)" style="background-image: url('https://img.icons8.com/?size=100&id=78459&format=png&color=000000')">250000💰</div>
                <div class="skin-btn leg-s" id="s3" onclick="buySkin(3, 5000, true)" style="background-image: url('https://img.icons8.com/?size=100&id=78253&format=png&color=000000')">5000💎</div>
            </div>
        </div>

        <div class="panel">
            <div class="mine-box">
                <div style="font-size:9px; display:flex; justify-content:space-between;"><span>ГЕНЕРАТОР ЩИТОВ</span><span id="mine-perc">0%</span></div>
                <div class="bar-bg"><div id="mine-fill"></div></div>
                <button onclick="buyStat('shield_chip')" id="btn_chip" style="width:100%; font-size:8px;">ОБМЕН 150💎 НА +2 УР. ЖИЗНИ</button>
            </div>
        </div>

        <div class="panel">
            <div class="grid">
                <div class="card"><b>⚔️ УРОН</b>Ур.<span id="lvl_dmg">1</span><button onclick="buyStat('dmg')" id="btn_up_dmg">0</button></div>
                <div class="card"><b>❤️ ЖИЗНЬ</b>Ур.<span id="lvl_hp">1</span><button onclick="buyStat('hp')" id="btn_up_hp">0</button></div>
                <div class="card"><b>💰 УДАЧА</b>Ур.<span id="lvl_loot">1</span><button onclick="buyStat('loot')" id="btn_up_loot">0</button></div>
                <div class="card"><b>⚡ ПЛАЗМА</b>LEG Лук<button onclick="buyLeg('leg_1', 500)" id="btn_leg_1">500💎</button></div>
                <div class="card"><b>🔨 МОЛОТ</b>LEG Топор<button onclick="buyLeg('leg_2', 1000)" id="btn_leg_2">1000💎</button></div>
                <div class="card"><b>🕳️ ДЫРА</b>LEG Ядро<button onclick="buyLeg('leg_3', 2500)" id="btn_leg_3">2500💎</button></div>
            </div>
        </div>
    </div>

    <div id="battle-ui">
        <div id="battle-top">
            <div class="hp-cont"><div id="hp-p" class="hp-fill"></div></div>
            <div id="b-gold" style="color:gold; font-size:12px; font-weight:bold;">💰 0</div>
            <div class="hp-cont"><div id="hp-e" class="hp-fill" style="background:var(--pink)"></div></div>
        </div>
        <div id="weaponDock">
            <div class="w-btn active" id="slot0" onclick="switchWep(0)">🏹<i class="w-cost">FREE</i></div>
            <div class="w-btn" id="slot1" onclick="switchWep(1)">🪓<i class="w-cost">10💰</i></div>
            <div class="w-btn" id="slot2" onclick="switchWep(2)">💣<i class="w-cost">50💰</i></div>
        </div>
    </div>
    
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });

        const skinUrls = [
            'https://img.icons8.com/?size=100&id=59023&format=png&color=000000',
            'https://img.icons8.com/?size=100&id=sQ8d3BxweuhA&format=png&color=000000',
            'https://img.icons8.com/?size=100&id=78459&format=png&color=000000',
            'https://img.icons8.com/?size=100&id=78253&format=png&color=000000'
        ];
        const imgP = new Image();
        const imgE = new Image(); imgE.src = 'https://img.icons8.com/?size=100&id=BjByu959rSNb&format=png&color=000000';
        const imgWall = new Image(); 
imgWall.src = 'https://img.icons8.com/?size=100&id=7U5jR3e3D6HV&format=png&color=000000';

        let game = { 
            user: "", gold: 100, chips: 0, mine: 0, tower: 0, stage: 0, 
            curWep: 0, skinIdx: 0, ownedSkins: [0], ownedWeps: ['w0', 'w1', 'w2'],
            stats: { dmg: 1, hp: 1, loot: 1 }
        };

        const TOWERS = [
            { name: "Трущобы", stages: 5, g: 0.18, bg: "#050202", diff: 1.0 },
            { name: "Неон-Сити", stages: 8, g: 0.22, bg: "#020210", diff: 1.5 },
            { name: "Завод", stages: 10, g: 0.25, bg: "#0a0805", diff: 2.2 },
            { name: "Био-Зона", stages: 12, g: 0.28, bg: "#051005", diff: 3.0 },
            { name: "Облака", stages: 15, g: 0.15, bg: "#050a10", diff: 4.5 },
            { name: "Кристаллы", stages: 15, g: 0.35, bg: "#0a0015", diff: 6.0 },
            { name: "Орбита", stages: 20, g: 0.12, bg: "#000000", diff: 8.5 },
            { name: "Пустота", stages: 25, g: 0.22, bg: "#020002", diff: 12.0 },
            { name: "Цитадель", stages: 30, g: 0.40, bg: "#150505", diff: 20.0 },
            { name: "Ядро", stages: 50, g: 0.25, bg: "#00050a", diff: 40.0 }
        ];
        
        const ARSENAL = [
            { type: "arrow", d: 25, f: 0.4, p: 0, leg: false },
            { type: "axe", d: 65, f: 0.45, p: 10, leg: false },
            { type: "bomb", d: 120, f: 0.5, p: 50, leg: false },
            { type: "arrow", d: 85, f: 0.6, p: 0, leg: true },
            { type: "axe", d: 220, f: 0.5, p: 10, leg: true },
            { type: "bomb", d: 500, f: 0.6, p: 50, leg: true }
        ];

        let player, enemy, wall, projectiles = [], turn = 'p', isAiming = false, tStart = {x:0, y:0}, tCurr = {x:0, y:0};
        let particles = [], explosions = [], lastTime = 0;

        function save() { localStorage.setItem('nomad_v_ultimate_final', JSON.stringify(game)); }

        function register() {
            let val = document.getElementById('reg-input').value.trim();
            if(val.length < 2) return;
            game.user = val;
            document.getElementById('reg-screen').style.display = 'none';
            document.getElementById('hub').style.display = 'flex';
            setSkin(game.skinIdx); save(); updateHubUI();
        }

        function spinRoulette() {
            if(game.gold < 5000) return;
            game.gold -= 5000;
            const resEl = document.getElementById('roulette-result');
            const rand = Math.random();
            if(rand < 0.5) {
                const win = Math.floor(Math.random() * 8000) + 1000;
                game.gold += win; resEl.innerText = `ВЫИГРЫШ: ${win}💰`; resEl.style.color = "gold";
            } else if(rand < 0.85) {
                resEl.innerText = "ПУСТО..."; resEl.style.color = "#888";
            } else {
                game.chips += 5; resEl.innerText = "ДЖЕКПОТ: 5💎"; resEl.style.color = "cyan";
            }
            save(); updateHubUI();
        }

        function buySkin(idx, price, isCrystal = false) {
            if (game.ownedSkins.includes(idx)) { setSkin(idx); } else {
                if (isCrystal) { if (game.chips >= price) { game.chips -= price; game.ownedSkins.push(idx); setSkin(idx); } } 
                else { if (game.gold >= price) { game.gold -= price; game.ownedSkins.push(idx); setSkin(idx); } }
            }
            save(); updateHubUI();
        }

        function setSkin(idx) {
            game.skinIdx = idx;
            imgP.src = skinUrls[idx];
            document.querySelectorAll('.skin-select .skin-btn').forEach((b, i) => {
                b.classList.toggle('active', i === idx);
                if (game.ownedSkins.includes(i)) b.classList.add('owned');
            });
        }

        function buyStat(type) {
            if (type === 'shield_chip' && game.chips >= 150) { game.chips -= 150; game.stats.hp += 2; } 
            else {
                let cost = Math.floor(100 * Math.pow(1.8, game.stats[type]-1));
                if (game.gold >= cost) { game.gold -= cost; game.stats[type]++; }
            }
            save(); updateHubUI();
        }

        function buyLeg(id, price) {
            if (game.chips >= price && !game.ownedWeps.includes(id)) { game.chips -= price; game.ownedWeps.push(id); save(); updateHubUI(); }
        }

        function updateHubUI() {
            document.getElementById('gold-val').innerText = Math.floor(game.gold);
            document.getElementById('chip-val').innerText = game.chips;
            document.getElementById('user-tag').innerText = game.user || "PILOT";
            let t = TOWERS[game.tower] || TOWERS[TOWERS.length-1];
            document.getElementById('tower-title').innerText = `БАШНЯ ${game.tower+1}: ${t.name.toUpperCase()} (${game.stage+1}/${t.stages})`;
            ['dmg', 'hp', 'loot'].forEach(id => {
                let cost = Math.floor(100 * Math.pow(1.8, game.stats[id]-1));
                document.getElementById('lvl_'+id).innerText = game.stats[id];
                document.getElementById('btn_up_'+id).innerText = cost + "💰";
                document.getElementById('btn_up_'+id).disabled = game.gold < cost;
            });
            for(let i=1; i<=3; i++) {
                if(game.ownedWeps.includes('leg_'+i)) {
                    document.getElementById('btn_leg_'+i).innerText = "OK";
                    document.getElementById('btn_leg_'+i).disabled = true;
                    document.getElementById('slot'+(i-1)).classList.add('leg');
                }
            }
            document.getElementById('spin-btn').disabled = game.gold < 5000;
        }

        function goBattle() {
            canvas.style.display = 'block'; document.getElementById('hub').style.display = 'none';
            document.getElementById('battle-ui').style.display = 'block';
            resize();
            let pMaxHP = 150 + (game.stats.hp-1)*50;
            player = { x: canvas.width * 0.15, hp: pMaxHP, maxHP: pMaxHP };
            let t = TOWERS[game.tower] || TOWERS[TOWERS.length-1];
            let eHP = Math.floor((100 + (game.tower * 150) + (game.stage * 40)) * t.diff);
            enemy = { x: canvas.width * 0.85, hp: eHP, maxHP: eHP };
            let h = canvas.height * 0.2 + Math.random() * (canvas.height * 0.2);
            wall = { x: canvas.width * 0.45, y: canvas.height - 130 - h, w: 35, h: h };
            projectiles = []; turn = 'p'; updateBattleUI();
        }

        function updateBattleUI() {
            document.getElementById('hp-p').style.width = (player.hp/player.maxHP*100) + "%";
            document.getElementById('hp-e').style.width = (enemy.hp/enemy.maxHP*100) + "%";
            document.getElementById('b-gold').innerText = "💰 " + Math.floor(game.gold);
        }

        function switchWep(idx) { game.curWep = idx; document.querySelectorAll('.w-btn').forEach((b, i) => b.classList.toggle('active', i === idx)); }

        function drawEntity(img, x, y, isEnemy) {
            if (!img.complete || img.naturalWidth === 0) return;
            ctx.save(); ctx.translate(x, y-155); if(isEnemy) ctx.scale(-1, 1);
            ctx.drawImage(img, -20, -20, 40, 40); ctx.restore();
        }

        function drawProjectile(p) {
            ctx.save(); ctx.translate(p.x, p.y);
            if(p.type === "axe") { ctx.rotate(Date.now()*0.02); ctx.font = "24px serif"; ctx.fillText("🪓", -12, 10); }
            else { 
                ctx.rotate(Math.atan2(p.vy, p.vx)); ctx.fillStyle = p.leg ? "gold" : "white";
                if(p.type === "arrow") { ctx.fillRect(-15,-1.5,30,3); ctx.beginPath(); ctx.moveTo(15,0); ctx.lineTo(10,-5); ctx.lineTo(10,5); ctx.fill(); }
                else { ctx.beginPath(); ctx.arc(0,0,10,0,7); ctx.fill(); }
            }
            ctx.restore();
        }

        function update() {
            let t = TOWERS[game.tower] || TOWERS[TOWERS.length-1];
            for (let i = projectiles.length - 1; i >= 0; i--) {
                let p = projectiles[i]; p.x += p.vx; p.y += p.vy; p.vy += t.g;
                if (Math.random() > 0.4) particles.push({x: p.x, y: p.y, life: 1, c: p.leg || game.skinIdx === 3 ? 'gold' : 'white'});
                let target = p.owner === 'p' ? enemy : player;
                let hitT = Math.hypot(p.x - target.x, p.y - (canvas.height - 155)) < 35;
                let hitW = (p.x > wall.x && p.x < wall.x + wall.w && p.y > wall.y);
                if (hitT || hitW || p.y > canvas.height - 130) {
                    if (hitT) target.hp -= p.dmg;
                    if (p.type === "bomb") explosions.push({x: p.x, y: p.y, r: 0, maxR: 150, a: 1});
                    projectiles.splice(i, 1); updateBattleUI();
                    if (enemy.hp <= 0 || player.hp <= 0) {
                        if(enemy.hp <= 0) { 
                            game.gold += 300 * game.stats.loot * t.diff; 
                            game.stage++; 
                            if(game.stage >= t.stages){ game.tower++; game.stage = 0; }
                        }
                        save(); setTimeout(exitBattle, 1000);
                    } else if (projectiles.length === 0) { turn = (turn === 'p') ? 'e' : 'p'; if (turn === 'e') setTimeout(enemyTurn, 1000); }
                }
            }
        }

        function enemyTurn() {
    const t = TOWERS[game.tower] || TOWERS[TOWERS.length - 1];
    const g = t.g;
    
    // Точные координаты (учитываем высоту персонажей)
    const targetX = player.x;
    const targetY = canvas.height - 170;
    const startX = enemy.x;
    const startY = canvas.height - 170;
    
    const dist = startX - targetX;
    
    // 1. ВЫБОР УГЛА СТРЕЛЬБЫ
    // Чтобы гарантированно перебросить стену, боту нужен крутой угол (60-70 градусов)
    // Угол в радианах (65 градусов для навеса)
    const angleRad = 65 * Math.PI / 180;

    // 2. ФОРМУЛА БАЛЛИСТИКИ ДЛЯ ПОПАДАНИЯ В ТОЧКУ
    // v = sqrt( (g * x^2) / (2 * x * sin(a) * cos(a) - 2 * y * cos^2(a)) )
    // В нашем случае y (разница высот) почти 0, упрощаем:
    let velocity = Math.sqrt((dist * g) / Math.sin(2 * angleRad));

    // 3. ПРОВЕРКА ПЕРЕЛЕТА ЧЕРЕЗ СТЕНУ
    // Рассчитываем высоту полета в точке стены
    const wallDist = startX - (wall.x + wall.w/2);
    const timeToWall = wallDist / (velocity * Math.cos(angleRad));
    const heightAtWall = startY - (velocity * Math.sin(angleRad) * timeToWall - 0.5 * g * timeToWall * timeToWall);
    
    // Если снаряд ниже стены, увеличиваем силу, пока не перелетит
    if (heightAtWall > wall.y) {
        velocity *= 1.2; 
    }

    // 4. ТОЧНОСТЬ (РАЗБРОС)
    // На 1 башне ИИ мажет. На 10-й башне (game.tower = 9) погрешность стремится к 0.
    const skill = Math.min(game.tower / 9, 1); // 0 (нуб) до 1 (профи)
    const errorRange = 0.15 * (1 - skill); 
    const randomFactor = 1 + (Math.random() * errorRange * 2 - errorRange);
    const finalVel = velocity * randomFactor;

    // 5. ВЫБОР ТИПА ОРУЖИЯ
    let type = (Math.random() < 0.3) ? "bomb" : "arrow";
    let dmg = (type === "bomb" ? 40 : 20) * t.diff;

    projectiles.push({ 
        x: startX, 
        y: startY, 
        vx: -Math.cos(angleRad) * finalVel, 
        vy: -Math.sin(angleRad) * finalVel, 
        g: g,
        dmg: dmg, 
        owner: 'e', 
        type: type, 
        leg: false,
        angle: 0
    });
}

        function draw() {
            const t = TOWERS[game.tower] || TOWERS[TOWERS.length-1];
            ctx.fillStyle = t.bg; ctx.fillRect(0,0,canvas.width, canvas.height);
            // Отрисовка стены картинками
if (imgWall.complete) {
    const blockSize = wall.w; // Ширина блока равна ширине стены
    for (let currentY = wall.y; currentY < wall.y + wall.h; currentY += blockSize) {
        // Рисуем блоки один над другим
        let drawH = Math.min(blockSize, (wall.y + wall.h) - currentY);
        ctx.drawImage(imgWall, wall.x, currentY, wall.w, drawH);
    }
} else {
    // Резервный вариант, если картинка не загрузилась
    ctx.fillStyle = "#333";
    ctx.fillRect(wall.x, wall.y, wall.w, wall.h);
}
            ctx.fillStyle = "#0a0a0a"; ctx.fillRect(0, canvas.height - 130, canvas.width, 130);
            drawEntity(imgP, player.x, canvas.height, false);
            drawEntity(imgE, enemy.x, canvas.height, true);
            if (isAiming && turn === 'p') {
                let w = (game.ownedWeps.includes('leg_'+(game.curWep+1))) ? ARSENAL[game.curWep+3] : ARSENAL[game.curWep];
                let vx = (tStart.x - tCurr.x) * w.f, vy = (tStart.y - tCurr.y) * w.f, tx = player.x, ty = canvas.height-155;
                ctx.beginPath(); ctx.strokeStyle = w.leg ? "gold" : "cyan";
                for (let i=0; i<25; i++) { tx += vx; ty += vy; vy += t.g; ctx.lineTo(tx, ty); if(ty>canvas.height-130) break; }
                ctx.stroke();
            }
            projectiles.forEach(drawProjectile);
            particles.forEach((p, i) => { p.life -= 0.03; ctx.fillStyle = p.c; ctx.globalAlpha = p.life; ctx.fillRect(p.x,p.y,2,2); if(p.life <= 0) particles.splice(i,1); });
            explosions.forEach((e, i) => { e.r += 6; e.a -= 0.03; ctx.beginPath(); ctx.strokeStyle=`rgba(255,200,0,${e.a})`; ctx.arc(e.x,e.y,e.r,0,7); ctx.stroke(); if(e.a<=0) explosions.splice(i,1); });
            ctx.globalAlpha = 1;
        }

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        function exitBattle() { canvas.style.display='none'; document.getElementById('hub').style.display='flex'; document.getElementById('battle-ui').style.display='none'; updateHubUI(); }

        canvas.addEventListener('pointerdown', e => { if(turn === 'p' && projectiles.length === 0 && e.clientY < canvas.height - 100) { isAiming = true; tStart = {x:e.clientX, y:e.clientY}; tCurr = {x:e.clientX, y:e.clientY}; }});
        canvas.addEventListener('pointermove', e => { if(isAiming) tCurr = {x:e.clientX, y:e.clientY}; });
        canvas.addEventListener('pointerup', e => {
            if(isAiming) {
                isAiming = false; 
                let w = (game.ownedWeps.includes('leg_'+(game.curWep+1))) ? ARSENAL[game.curWep+3] : ARSENAL[game.curWep];
                if(game.gold >= w.p) { game.gold -= w.p; projectiles.push({ x: player.x, y: canvas.height - 155, vx: (tStart.x - e.clientX)*w.f, vy: (tStart.y - e.clientY)*w.f, dmg: game.stats.dmg * w.d, owner: 'p', type: w.type, leg: w.leg }); updateBattleUI(); }
            }
        });

        const saved = localStorage.getItem('nomad_v_ultimate_final');
        if(saved) { game = JSON.parse(saved); document.getElementById('reg-screen').style.display = 'none'; document.getElementById('hub').style.display = 'flex'; setSkin(game.skinIdx); }

        function loop(t) {
            const dt = t - lastTime; lastTime = t;
            if (document.getElementById('hub').style.display === 'flex') {
                game.mine += 0.03 * (dt || 16);
                if (game.mine >= 100) { game.chips++; game.mine = 0; save(); updateHubUI(); }
                document.getElementById('mine-fill').style.width = game.mine + "%";
                document.getElementById('mine-perc').innerText = Math.floor(game.mine) + "%";
            }
            if (canvas.style.display === 'block') { update(); draw(); }
            requestAnimationFrame(loop);
        }
        updateHubUI(); resize(); requestAnimationFrame(loop);
    </script>
</body>
</html>

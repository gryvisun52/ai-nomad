<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Nomad: Final Build</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <!-- SDK Платформ -->
    <script src="https://telegram.org"></script>
    <script src="https://yandex.ru"></script>
    <script src="https://unpkg.com"></script>
    <!-- Firebase SDK (Compat version для стабильности) -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
</head>
<body>
    <div id="mining-overlay" style="display: none;"></div>
    <div id="game-container">
        <header>
            <div class="main-info">
                <h1>LVL: <span id="level">1</span> | <span id="rank">Новичок</span></h1>
                <div id="xp-bar-container"><div id="xp-fill"></div></div>
                <div style="font-size: 0.8rem; color: var(--neon);">👤 <span id="display-username">Загрузка...</span></div>
            </div>
            <div class="stats-grid">
                <div>💰 <span id="money">0</span>$</div>
                <div>📈 <span id="reach">10</span></div>
                <div>💎 <span id="gems">100</span></div>
                <div onclick="openLeaderboard()" style="cursor:pointer; color:var(--neon)">🏆 <span id="league-name">Бронза</span></div>
            </div>
        </header>

        <main>
            <section id="action-zone">
                <div id="ai-output">Система онлайн</div>
                <div id="turbo-timer" style="display: none; color: #ffcc00; font-weight: bold;">🚀 ТУРБО: <span id="turbo-sec">30</span>с</div>
                <button id="generate-btn">ГЕНЕРИРОВАТЬ</button>
                <button id="turbo-btn" onclick="activateTurbo()">🚀 ТУРБО x10 (AD)</button>
            </section>

            <div id="tabs">
                <button class="tab-btn active" onclick="showTab(event, 'farm')">🤖 Ферма</button>
                <button class="tab-btn" onclick="showTab(event, 'craft')">🛠️ Крафт</button>
            </div>

            <section id="farm" class="tab-content active">
                <div class="panel">
                    <h3>Доход: +<span id="total-auto-income">0</span>$/с</h3>
                    <button class="buy-btn" onclick="buyFarm('bot1', 100, 5)">Бот-писатель (<span id="count-bot1">0</span>) | <span id="price-bot1">100</span>$</button>
                    <button class="buy-btn" onclick="buyFarm('bot2', 800, 30)">Стрим-бот (<span id="count-bot2">0</span>) | <span id="price-bot2">800</span>$</button>
                    <button class="buy-btn" onclick="openDonateShop()" style="background: #0077ff;">Купить Гемы 💎</button>
                </div>
            </section>

            <section id="craft" class="tab-content">
                <div class="panel fab-lab">
                    <div id="fab-controls" class="locked">
                        <div class="fab-item">
                            <button class="buy-btn" id="make-chip-btn" onclick="startResourceProduction('chips', 30)">Чип</button>
                            <div class="progress-min"><div id="progress-chips" class="fill"></div></div>
                        </div>
                        <div class="fab-item">
                            <button class="buy-btn" id="make-code-btn" onclick="startResourceProduction('code', 20)">Код</button>
                            <div class="progress-min"><div id="progress-code" class="fill"></div></div>
                        </div>
                    </div>
                </div>
                <div class="panel">
                    <div class="res-row">⚙️: <span id="res-chips">0</span> | 💾: <span id="res-code">0</span></div>
                    <button class="buy-btn" onclick="openCase()" style="background: #ffcc00; color: #000;">Кейс (50 💎)</button>
                    <div class="craft-item"><b>🤖 Нейро-Шлем</b><p>30⚙️, 20💾 | x2 XP</p><button class="buy-btn" id="btn-craft-helmet" onclick="craftItem('helmet', 30, 20)">Скрафтить</button></div>
                    <div class="craft-item"><b>💎 Крипто-Сервер</b><p>150⚙️, 100💾 | +1💎/30с</p><button class="buy-btn" id="btn-craft-server" onclick="craftItem('server', 150, 100)">Скрафтить</button></div>
                </div>
            </section>
        </main>
    </div>

    <!-- Модалки -->
    <div id="auth-overlay" class="modal" style="display: none; z-index: 500;"><div class="modal-content">
        <h2>ВХОД НОМАДА</h2>
        <input type="text" id="username-input" placeholder="Никнейм..." maxlength="15" style="width:100%; padding:12px; background:#000; border:1px solid var(--neon); color:#fff; text-align:center; margin-bottom:10px;">
        <button id="reg-btn" class="buy-btn" onclick="registerManual()">НАЧАТЬ</button>
    </div></div>

    <div id="case-overlay" class="modal"><div class="modal-content">
        <div id="spinner-container"><div id="items-strip"></div><div id="pointer"></div></div>
        <h2 id="win-msg">Удачи!</h2>
        <p id="win-text" style="color:var(--neon); font-weight:bold;"></p>
        <button id="collect-btn" onclick="closeModal('case-overlay')" style="display:none;width:100%">Забрать</button>
    </div></div>

    <div id="leaderboard-overlay" class="modal"><div class="modal-content">
        <h2>TOP NOMADS</h2>
        <div id="leaderboard-list" style="text-align: left; margin-bottom: 15px;"></div>
        <button class="buy-btn" onclick="closeModal('leaderboard-overlay')">Назад</button>
    </div></div>

    <div id="donate-overlay" class="modal"><div class="modal-content">
        <h2>Магазин</h2><button class="buy-btn" onclick="processDonate(500)">500 💎 — 1.99$</button>
        <button class="buy-btn" onclick="closeModal('donate-overlay')">Закрыть</button>
    </div></div>

    <div id="toast"></div>

    <audio id="snd-click" src="https://soundjay.com"></audio>
    <audio id="snd-win" src="https://soundjay.com"></audio>
    <audio id="snd-level" src="https://soundjay.com"></audio>

    <script src="script.js"></script>
</body>
</html>

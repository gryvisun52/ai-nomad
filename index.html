<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Nomad: Final Build</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
</head>
<body>
    <div id="game-container">
        <header>
            <div class="user-profile">
                <span id="display-username">Загрузка...</span>
                <span id="rank-badge">Новичок</span>
            </div>
            <div class="level-box">
                <div class="level-label">Уровень <span id="level">1</span></div>
                <div id="xp-bar-container"><div id="xp-fill"></div></div>
            </div>
            <div class="stats-main">
                <div class="stat-card">💰 <span id="money">0</span></div>
                <div class="stat-card">💎 <span id="gems">100</span></div>
            </div>
            <div class="stats-sub">
                <span>📈 Охват: <span id="reach">10</span></span>
                <span>🏆 <span id="league-name">Бронза</span></span>
            </div>
        </header>

        <main>
            <section id="action-zone">
                <button id="generate-btn">ГЕНЕРИРОВАТЬ</button>
            </section>

            <div id="tabs">
                <button class="tab-btn active" onclick="showTab(event, 'farm')">🤖 Ферма</button>
                <button class="tab-btn" onclick="showTab(event, 'craft')">🛠️ Цех</button>
            </div>

            <section id="farm" class="tab-content active">
                <div class="income-info">Пассивный доход: +<span id="total-auto-income">0</span>$/с</div>
                <div class="shop-grid">
                    <button class="buy-btn" onclick="buyFarm('bot1', 100, 5)">
                        Бот-писатель (<span id="count-bot1">0</span>) <span>$</span><span id="price-bot1">100</span>
                    </button>
                    <button class="buy-btn" onclick="buyFarm('bot2', 800, 30)">
                        Стрим-бот (<span id="count-bot2">0</span>) <span>$</span><span id="price-bot2">800</span>
                    </button>
                </div>
            </section>

            <section id="craft" class="tab-content" style="display:none;">
                <div class="resource-panel">
                    <div class="res-item">⚙️ <span id="res-chips">0</span></div>
                    <div class="res-item">💾 <span id="res-code">0</span></div>
                </div>
                <button class="buy-btn special" onclick="openCase()">📦 Открыть кейс (50 💎)</button>
                <div class="fab-section">
                    <button class="buy-btn" id="make-chip-btn" onclick="startResourceProduction('chips', 500, 30)">Чип</button>
                    <div class="progress-min"><div id="progress-chips" class="fill"></div></div>
                    <button class="buy-btn" id="make-code-btn" onclick="startResourceProduction('code', 300, 20)">Код</button>
                    <div class="progress-min"><div id="progress-code" class="fill"></div></div>
                </div>
            </section>
        </main>
    </div>

    <!-- Модалки -->
    <div id="auth-overlay" class="modal-fs" style="display:none;">
        <div class="modal-box">
            <h2>AI NOMAD</h2>
            <input type="text" id="username-input" placeholder="Никнейм..." maxlength="12">
            <button class="buy-btn" onclick="registerManual()">НАЧАТЬ</button>
        </div>
    </div>

    <div id="case-overlay" class="modal-fs" style="display:none;">
        <div class="modal-box case-win">
            <h2 id="win-msg">ВЫИГРЫШ!</h2>
            <div id="win-text"></div>
            <button class="buy-btn" onclick="closeModal('case-overlay')">ПРИНЯТЬ</button>
        </div>
    </div>

    <div id="toast"></div>
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Nomad: Empire Final</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://unpkg.com"></script>
    <script src="https://yandex.ru"></script>
    <script src="https://telegram.org"></script>
</head>
<body>
    <div id="mining-overlay"></div>
    <div id="game-container">
        <!-- ВЕРХНЯЯ ПАНЕЛЬ -->
        <header id="main-stats">
            <div class="user-info">
                <span id="display-username">Загрузка...</span>
                <button id="ad-bonus-btn" onclick="AdManager.showReward('bonus_xp')">🎁 БОНУС XP</button>
            </div>
            <div class="xp-container">
                <div class="xp-text">LVL <span id="level">1</span></div>
                <div id="xp-bar-container"><div id="xp-fill"></div></div>
            </div>
            <div class="res-grid">
                <div class="res-item">💰 <span id="money">0</span></div>
                <div class="res-item">💎 <span id="gems">100</span></div>
                <div class="res-item">📈 <span id="reach">10</span></div>
                <div class="res-item" onclick="openLeaderboard()" style="color:var(--neon); cursor:pointer">🏆 ТОП</div>
            </div>
            <div id="rep-bar-info" style="font-size: 0.65rem; margin-top: 5px; color: #aaa; display: flex; justify-content: space-between;">
                <span>😇 Репутация: <span id="reputation-display">100</span>%</span>
                <span id="rank-badge">Новичок</span>
            </div>
        </header>

        <main>
            <section id="action-zone">
                <div id="turbo-timer-display">⚡ ТУРБО: <span id="turbo-sec">30</span>с</div>
                <button id="generate-btn">ГЕНЕРИРОВАТЬ</button>
                <button id="turbo-btn" onclick="activateTurbo()">🚀 ТУРБО x10 (AD)</button>
            </section>

            <nav id="tabs">
                <button class="tab-btn active" onclick="showTab(event, 'farm')">🤖 Ферма</button>
                <button class="tab-btn" onclick="showTab(event, 'craft')">🛠️ Крафт</button>
                <button class="tab-btn" onclick="showTab(event, 'lab')">🧬 Лаба</button>
            </nav>

            <section id="farm" class="tab-content active">
                <div class="panel">
                    <p class="income-label">Доход: +<span id="total-auto-income">0</span>$/с</p>
                    <button class="buy-btn" id="buy-bot1" onclick="buyFarm('bot1', 100, 5)">
                        <span>Писатель (<span id="count-bot1">0</span>)</span>
                        <b id="price-bot1">$100</b>
                    </button>
                    <button class="buy-btn" id="buy-bot2" onclick="buyFarm('bot2', 800, 30)">
                        <span>Стример (<span id="count-bot2">0</span>)</span>
                        <b id="price-bot2">$800</b>
                    </button>
                </div>
            </section>

            <section id="craft" class="tab-content" style="display:none;">
                <div class="panel fab-lab">
                    <h4>🏭 Цех ресурсов (с 5 LVL)</h4>
                    <div id="fab-controls" class="locked">
                        <button class="buy-btn" id="make-chip-btn" onclick="startResourceProduction('chips', 500, 30)">Чип</button>
                        <div class="progress-min"><div id="progress-chips" class="fill"></div></div>
                        <button class="buy-btn" id="make-code-btn" onclick="startResourceProduction('code', 300, 20)">Код</button>
                        <div class="progress-min"><div id="progress-code" class="fill"></div></div>
                    </div>
                </div>
                <div class="panel">
                    <div class="inventory-row" style="margin-bottom:10px; font-weight:bold">⚙️: <span id="res-chips">0</span> | 💾: <span id="res-code">0</span></div>
                    <button class="buy-btn case-btn" onclick="openCase()">📦 КЕЙС (50 💎)</button>
                    <div class="craft-grid">
                        <div class="craft-card">
                            <div class="craft-icon">🤖</div>
                            <b>Нейро-Шлем</b>
                            <p style="font-size:0.6rem; color:var(--neon); margin:2px 0;">Удваивает XP (x2)</p>
                            <button class="buy-btn craft-trigger" id="btn-craft-helmet" onclick="craftItem('helmet', 30, 20)">30⚙️ 20💾</button>
                        </div>
                        <div class="craft-card gold-border">
                            <div class="craft-icon">💎</div>
                            <b>Крипто-Сервер</b>
                            <p style="font-size:0.6rem; color:var(--gold); margin:2px 0;">Майнинг гемов</p>
                            <button class="buy-btn craft-trigger" id="btn-craft-server" onclick="craftItem('server', 150, 100)">150⚙️ 100💾</button>
                            <button class="buy-btn" id="btn-upgrade-server" style="display:none; background:var(--gold); color:#000" onclick="upgradeServerPower()">РАЗГОН</button>
                        </div>
                    </div>
                </div>
            </section>

            <section id="lab" class="tab-content" style="display:none;">
                <div class="panel">
                    <h4>🧬 Quantum Lab</h4>
                    <p class="income-label">XP: +<span id="auto-xp-income">0</span>/с | Буст: x<span id="lab-mult-display">1.0</span></p>
                    <button class="buy-btn" onclick="upgradeLab()">
                        <span>Апгрейд Ядра (<span id="lab-lvl">0</span>)</span>
                        <b id="lab-cost-display">$500</b>
                    </button>
                    <p style="font-size:0.6rem; color:#888; margin-top:5px;">*Дает пассивный опыт и бустит весь доход $</p>
                </div>
            </section>
        </main>
    </div>

    <!-- МОДАЛКИ -->
    <div id="auth-overlay" class="modal" style="display:none;"><div class="modal-content">
        <h2>ВХОД</h2>
        <input type="text" id="username-input" placeholder="Никнейм..." maxlength="12">
        <button class="buy-btn" onclick="registerManual()" style="justify-content:center; background:var(--neon); color:#000">НАЧАТЬ</button>
    </div></div>
    <div id="case-overlay" class="modal" style="display:none;"><div class="modal-content">
        <div id="spinner-container"><div id="items-strip"></div><div id="pointer"></div></div>
        <h2 id="win-msg">УДАЧИ!</h2>
        <p id="win-text" style="font-size:1.4rem; color:var(--neon); font-weight:bold;"></p>
        <button class="buy-btn" onclick="closeModal('case-overlay')" style="justify-content:center">ЗАКРЫТЬ</button>
    </div></div>
    <div id="leaderboard-overlay" class="modal" style="display:none;"><div class="modal-content">
        <h2>ТОП 10</h2><div id="leaderboard-list"></div>
        <button class="buy-btn" onclick="closeModal('leaderboard-overlay')" style="justify-content:center">НАЗАД</button>
    </div></div>
    <div id="toast"></div>
    <script src="script.js"></script>
</body>
</html>

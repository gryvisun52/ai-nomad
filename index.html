<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI NOMAD: FINAL TOWER EDITION</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
:root {
        --pink: #ff0055;
        --cyan: #00f2ff;
        --gold: #ffcc00;
        --bg: #050505;
    }
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: white;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            position: fixed;
        }

        .screen {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 15px;
            padding-top: env(safe-area-inset-top, 20px);
            text-align: center;
            overflow-y: auto;
            z-index: 5;
        }
        #reg-screen {
            display: flex;
            background: #000;
            z-index: 100;
            justify-content: center;
        }
        #hub {
            background: radial-gradient(circle, #111 0%, #000 100%);
        }

        input {
            background: #111;
            border: 1px solid var(--pink);
            color: white;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            margin: 10px;
            width: 80%;
            max-width: 300px;
            font-family: 'Orbitron';
        }
        button {
            background: var(--pink);
            border: none;
            color: white;
            padding: 8px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'Orbitron';
            font-size: 9px;
            transition: 0.2s;
        }
        button:active {
            transform: scale(0.95);
        }
        button:disabled {
            opacity: 0.3;
            filter: grayscale(1);
        }

        .panel {
            background: rgba(20,20,20,0.95);
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #333;
            width: 100%;
            max-width: 450px;
            margin-bottom: 8px;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }
        .card {
            background: #111;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #333;
            font-size: 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .mine-box {
            width: 100%;
            background: #000;
            border-radius: 10px;
            padding: 10px;
            border: 1px solid #222;
        }
        .bar-bg {
            background: #111;
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
            margin: 5px 0;
        }
        #mine-fill {
            height: 100%;
            background: var(--cyan);
            width: 0%;
            box-shadow: 0 0 10px var(--cyan);
        }

        .skin-select {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 5px;
            flex-wrap: wrap;
        }
        .skin-btn {
            width: 65px;
            height: 75px;
            border: 2px solid #333;
            border-radius: 8px;
            background-size: 30px;
            background-repeat: no-repeat;
            background-position: center 10px;
            cursor: pointer;
            background-color: #111;
            font-size: 7px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 5px;
        }
        .skin-btn.active {
            border-color: var(--cyan);
            box-shadow: 0 0 10px var(--cyan);
        }
        .skin-btn.leg-s {
            border-color: var(--gold);
        }
        .skin-btn.owned::after {
            content: '✅';
            position: absolute;
            top: -5px;
            right: -5px;
            font-size: 10px;
        }

        #gameCanvas {
            display: none;
            width: 100%;
            height: 100%;
            touch-action: none;
            position: fixed;
            z-index: 1;
        }
        #battle-ui {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 10;
            display: none;
        }
        #battle-top {
            position: absolute;
            top: env(safe-area-inset-top, 15px);
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .hp-cont {
            width: 30vw;
            height: 10px;
            background: #222;
            border-radius: 5px;
            border: 1px solid #444;
            overflow: hidden;
        }
        .hp-fill {
            height: 100%;
            background: var(--cyan);
            width: 100%;
            transition: width 0.3s;
        }

        #weaponDock {
            position: absolute;
            bottom: calc(20px + env(safe-area-inset-bottom, 0px));
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            pointer-events: auto;
        }
        .w-btn {
            width: 60px;
            height: 65px;
            background: rgba(0,0,0,0.8);
            border: 2px solid #333;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            position: relative;
        }
        .w-btn.active {
            border-color: var(--cyan);
            box-shadow: 0 0 10px var(--cyan);
        }
        .w-btn.leg {
            border-color: var(--gold);
            box-shadow: 0 0 10px var(--gold);
        }
        .w-cost {
            font-size: 7px;
            color: #888;
            font-style: normal;
            margin-top: 2px;
            font-family: 'Orbitron';
        }
        /* Новые стили для визуальной рулетки */
        .roulette-wrapper {
            position: relative;
            width: 100%;
            height: 80px;
            background: #000;
            border: 2px solid var(--gold);
            border-radius: 10px;
            overflow: hidden;
            /* Чтобы лента не вылезала за края */
            margin-top: 10px;
        }

        .roulette-tape {
            position: absolute;
            display: flex;
            left: 0;
            top: 0;
            height: 100%;
            transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1);
            /* Плавное замедление в конце */
        }

        .roulette-item {
            min-width: 70px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            background: #111;
            border-right: 1px solid #222;
        }

        .roulette-marker {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--cyan);
            transform: translateX(-50%);
            z-index: 5;
            box-shadow: 0 0 10px var(--cyan);
        }

    </style>
</head>
<body>

    <div id="reg-screen" class="screen">
        <h2 style="color:var(--pink)">AI NOMAD</h2>
        <input type="text" id="reg-input" placeholder="НИКНЕЙМ" maxlength="10">
        <button onclick="register()">ВОЙТИ В СЕТЬ</button>
    </div>

    <div id="hub" class="screen">
        <h3 id="user-tag" style="color:var(--cyan); margin: 5px 0;">PILOT</h3>
        <p id="tower-title" style="color:var(--pink); font-size: 10px; margin-bottom: 5px;">
            БАШНЯ 1
        </p>

        <div class="panel">
            <div style="display:flex; justify-content: space-around; font-size: 14px;">
                <span style="color:gold">💰 <span id="gold-val">0</span></span>
                <span style="color:var(--cyan)">💎 <span id="chip-val">0</span></span>
            </div>
            <button onclick="goBattle()" style="width:100%; margin-top:8px; padding: 12px; background:var(--cyan); color:#000; font-size: 12px;">В БОЙ</button>
        </div>

        <div class="panel" style="border-color: var(--gold);">
            <p style="font-size: 9px; color: var(--gold);">
                КВАНТОВАЯ РУЛЕТКА
            </p>
            <div class="roulette-wrapper">
                <div class="roulette-marker"></div>
                <div id="roulette-tape" class="roulette-tape"></div>
            </div>
            <button onclick="spinRoulette()" id="spin-btn" style="width:100%; margin-top:10px; background: linear-gradient(45deg, #b8860b, #daa520); color: #000;">КРУТИТЬ (5000💰)</button>
            <div id="roulette-result" style="font-size: 10px; margin-top: 5px; height: 12px; color: var(--gold);">
                УДАЧИ!
            </div>
        </div>


        <div class="panel">
            <p style="font-size: 9px; color: var(--pink); margin-bottom: 5px;">
                ЭКИПИРОВКА
            </p>
            <div class="skin-select">
                <div class="skin-btn active owned" id="s0" onclick="buySkin(0, 0)" style="background-image: url('https://img.icons8.com/?size=100&id=59023&format=png&color=000000')">
                    FREE
                </div>
                <div class="skin-btn" id="s1" onclick="buySkin(1, 3000)" style="background-image: url('https://img.icons8.com/?size=100&id=sQ8d3BxweuhA&format=png&color=000000')">
                    3000💰
                </div>
                <div class="skin-btn" id="s2" onclick="buySkin(2, 250000)" style="background-image: url('https://img.icons8.com/?size=100&id=78459&format=png&color=000000')">
                    250000💰
                </div>
                <div class="skin-btn leg-s" id="s3" onclick="buySkin(3, 5000, true)" style="background-image: url('https://img.icons8.com/?size=100&id=78253&format=png&color=000000')">
                    5000💎
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="mine-box">
                <div style="font-size:9px; display:flex; justify-content:space-between;">
                    <span>ГЕНЕРАТОР ЩИТОВ</span><span id="mine-perc">0%</span>
                </div>
                <div class="bar-bg">
                    <div id="mine-fill"></div>
                </div>
                <button onclick="buyStat('shield_chip')" id="btn_chip" style="width:100%; font-size:8px;">ОБМЕН 150💎 НА +2 УР. ЖИЗНИ</button>
            </div>
        </div>

        <div class="panel">
            <div class="grid">
                <div class="card">
                    <b>⚔️ УРОН</b>Ур.<span id="lvl_dmg">1</span><button onclick="buyStat('dmg')" id="btn_up_dmg">0</button>
                </div>
                <div class="card">
                    <b>❤️ ЖИЗНЬ</b>Ур.<span id="lvl_hp">1</span><button onclick="buyStat('hp')" id="btn_up_hp">0</button>
                </div>
                <div class="card">
                    <b>💰 УДАЧА</b>Ур.<span id="lvl_loot">1</span><button onclick="buyStat('loot')" id="btn_up_loot">0</button>
                </div>
                <div class="card">
                    <b>⚡ ПЛАЗМА</b>LEG Лук<button onclick="buyLeg('leg_1', 500)" id="btn_leg_1">500💎</button>
                </div>
                <div class="card">
                    <b>🔨 МОЛОТ</b>LEG Топор<button onclick="buyLeg('leg_2', 1000)" id="btn_leg_2">1000💎</button>
                </div>
                <div class="card">
                    <b>🕳️ ДЫРА</b>LEG Бомба<button onclick="buyLeg('leg_3', 2500)" id="btn_leg_3">2500💎</button>
                </div>
            </div>
            <button onclick="logout()" style="width:100%; margin-top:10px; background: #222; font-size: 7px;">ВЫЙТИ ИЗ СЕТИ</button>
        </div>
    </div>

    <div id="battle-ui">
        <div id="battle-top">
            <div class="hp-cont">
                <div id="hp-p" class="hp-fill"></div>
            </div>
            <div id="b-gold" style="color:gold; font-size:12px; font-weight:bold;">
                💰 0
            </div>
            <div class="hp-cont">
                <div id="hp-e" class="hp-fill" style="background:var(--pink)"></div>
            </div>
        </div>
        <div id="weaponDock">
            <div class="w-btn active" id="slot0" onclick="switchWep(0)">
                🏹<i class="w-cost">FREE</i>
            </div>
            <div class="w-btn" id="slot1" onclick="switchWep(1)">
                🪓<i class="w-cost">10💰</i>
            </div>
            <div class="w-btn" id="slot2" onclick="switchWep(2)">
                💣<i class="w-cost">50💰</i>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        let lastPath = []; // Массив для хранения точек следа
        let pathAlpha = 0; // Прозрачность для затухания

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', {
            alpha: false
        });

        const skinUrls = [
            'https://img.icons8.com/?size=100&id=59023&format=png&color=000000',
            'https://img.icons8.com/?size=100&id=sQ8d3BxweuhA&format=png&color=000000',
            'https://img.icons8.com/?size=100&id=78459&format=png&color=000000',
            'https://img.icons8.com/?size=100&id=78253&format=png&color=000000'
        ];
        const imgP = new Image();
        const imgE = new Image(); imgE.src = 'https://img.icons8.com/?size=100&id=BjByu959rSNb&format=png&color=000000';
        const imgWall = new Image(); imgWall.src = 'https://img.icons8.com/?size=100&id=7U5jR3e3D6HV&format=png&color=000000';

        let game = {
            user: "",
            gold: 200,
            chips: 0,
            mine: 0,
            tower: 0,
            stage: 0,
            curWep: 0,
            skinIdx: 0,
            ownedSkins: [0],
            // Скин 0 открыт по умолчанию
            ownedWeps: ['w0',
                'w1',
                'w2'],
            // Стартовое оружие
            stats: {
                dmg: 1,
                hp: 1,
                loot: 1
            }
        };

        const TOWERS = [{
            name: "ТРУЩОБЫ",
            stages: 5,
            g: 0.18,
            bg: "#050202",
            diff: 1
        },
            {
                name: "ОРБИТА",
                stages: 15,
                g: 0.12,
                bg: "#000",
                diff: 5
            },
            {
                name: "ЯДРО",
                stages: 50,
                g: 0.25,
                bg: "#00050a",
                diff: 20
            }];

        const ARSENAL = [{
            type: "arrow",
            d: 25,
            f: 0.4,
            p: 0,
            leg: false
        }, // Обычный лук
            {
                type: "axe",
                d: 65,
                f: 0.45,
                p: 10,
                leg: false
            }, // Обычный топор
            {
                type: "bomb",
                d: 120,
                f: 0.5,
                p: 50,
                leg: false
            }, // Обычная бомба
            {
                type: "arrow",
                d: 150,
                f: 0.6,
                p: 0,
                leg: true
            }, // ПЛАЗМА
            {
                type: "axe",
                d: 400,
                f: 0.5,
                p: 10,
                leg: true
            }, // МОЛОТ
            {
                type: "bomb",
                d: 1200,
                f: 0.6,
                p: 50,
                leg: true
            } // ДЫРА
        ];

        let player,
        enemy,
        wall,
        projectiles = [],
        turn = 'p',
        isAiming = false,
        tStart = {
            x: 0,
            y: 0
        },
        tCurr = {
            x: 0,
            y: 0
        },
        lastTime = 0;

        function save() {
            localStorage.setItem('nomad_v_final', JSON.stringify(game));
        }

        function register() {
            let val = document.getElementById('reg-input').value.trim();
            if (val.length < 2) return;
            game.user = val;
            if (val.toUpperCase() === "pankixoy") {
                game.gold = 9999999; game.chips = 999999;
                game.ownedSkins = [0,
                    1,
                    2,
                    3];
                game.ownedWeps = ['w0',
                    'w1',
                    'w2',
                    'leg_1',
                    'leg_2',
                    'leg_3'];
            }
            document.getElementById('reg-screen').style.display = 'none';
            document.getElementById('hub').style.display = 'flex';
            setSkin(game.skinIdx); updateHubUI(); save();
        }

        function logout() {
            localStorage.removeItem('nomad_v_final'); location.reload();
        }

        let isSpinning = false;

        function buildRoulette() {
            const tape = document.getElementById('roulette-tape');
            tape.innerHTML = '';
            // Иконки призов: золото, чипы, ничего
            const icons = ['💰',
                '💎',
                '❌',
                '💰',
                '❌',
                '💰'];

            // Генерируем 80 случайных элементов для ленты
            for (let i = 0; i < 80; i++) {
                const item = document.createElement('div');
                item.className = 'roulette-item';
                item.innerHTML = icons[Math.floor(Math.random() * icons.length)];
                tape.appendChild(item);
            }
        }

        function spinRoulette() {
            if (game.gold < 5000 || isSpinning) return;

            game.gold -= 5000;
            isSpinning = true;
            document.getElementById('spin-btn').disabled = true;
            updateHubUI();

            const tape = document.getElementById('roulette-tape');
            const itemWidth = 70; // Ширина одного элемента в CSS
            const targetIdx = 70; // На каком элементе остановимся (ближе к концу ленты)

            // Генерируем новый случайный приз в целевой ячейке
            const prizes = [{
                i: '💰',
                t: 'gold',
                val: 10000
            },
                {
                    i: '💎',
                    t: 'chip',
                    val: 15
                },
                {
                    i: '❌',
                    t: 'none',
                    val: 0
                }];
            const win = prizes[Math.floor(Math.random() * prizes.length)];
            tape.children[targetIdx].innerHTML = win.i;
            tape.children[targetIdx].style.background = '#222';

            // Сбрасываем ленту
            tape.style.transition = 'none';
            tape.style.transform = 'translateX(0px)';

            // Запускаем анимацию через мгновение
            setTimeout(() => {
                tape.style.transition = 'transform 4s cubic-bezier(0.1, 0, 0.1, 1)';
                // Рассчитываем сдвиг так, чтобы маркер был посередине targetIdx
                const centerOffset = document.querySelector('.roulette-wrapper').offsetWidth / 2;
                const finalShift = (targetIdx * itemWidth) - centerOffset + (itemWidth / 2);
                tape.style.transform = `translateX(-${finalShift}px)`;
            }, 50);

            // Обработка результата после остановки (4 секунды)
            setTimeout(() => {
                isSpinning = false;
                document.getElementById('spin-btn').disabled = false;

                if (win.t === 'gold') game.gold += win.val;
                if (win.t === 'chip') game.chips += win.val;

                document.getElementById('roulette-result').innerText =
                win.t === 'none' ? "НИЧЕГО...": `ВЫИГРЫШ: ${win.i} ${win.val}!`;

                updateHubUI();
                save();
            },
                4100);
        }

        // Вызови эту функцию при старте игры или регистрации, чтобы рулетка была заполнена
        // Добавь это внутрь функции register() и в проверку saved данных:
        buildRoulette();


        function buySkin(idx,
            price,
            crystal) {
            if (game.ownedSkins.includes(idx)) return setSkin(idx);
            if (crystal ? game.chips >= price: game.gold >= price) {
                if (crystal) game.chips -= price; else game.gold -= price;
                game.ownedSkins.push(idx); setSkin(idx); updateHubUI(); save();
            }
        }

        function setSkin(idx) {
            game.skinIdx = idx; imgP.src = skinUrls[idx];
        }

        function buyStat(id) {
            if (id === 'shield_chip') {
                if (game.chips >= 150) {
                    game.chips -= 150; game.stats.hp += 2;
                }
            } else {
                let cost = Math.floor(100 * Math.pow(1.8, game.stats[id]-1));
                if (game.gold >= cost) {
                    game.gold -= cost; game.stats[id]++;
                }
            }
            updateHubUI(); save();
        }

        function buyLeg(id, p) {
            if (game.chips >= p && !game.ownedWeps.includes(id)) {
                game.chips -= p; game.ownedWeps.push(id); updateHubUI(); save();
            }
        }

        function updateHubUI() {
            const isAdm = game.user === "pankixoy";
            document.getElementById('gold-val').innerText = isAdm ? "∞": Math.floor(game.gold);
            document.getElementById('chip-val').innerText = isAdm ? "∞": game.chips;
            document.getElementById('user-tag').innerText = game.user;

            let t = TOWERS[game.tower] || TOWERS[0];
            document.getElementById('tower-title').innerText = `БАШНЯ ${game.tower + 1}: ${t.name} (${game.stage + 1}/${t.stages})`;

            document.getElementById('lvl_dmg').innerText = game.stats.dmg;
            document.getElementById('lvl_hp').innerText = game.stats.hp;
            document.getElementById('lvl_loot').innerText = game.stats.loot;

            document.getElementById('btn_up_dmg').innerText = Math.floor(100 * Math.pow(1.8, game.stats.dmg - 1)) + "💰";
            document.getElementById('btn_up_hp').innerText = Math.floor(100 * Math.pow(1.8, game.stats.hp - 1)) + "💰";
            document.getElementById('btn_up_loot').innerText = Math.floor(100 * Math.pow(1.8, game.stats.loot - 1)) + "💰";

            // Обновляем состояние кнопок скинов
            for (let i = 0; i < 4; i++) {
                const b = document.getElementById('s'+i);
                if (b) b.className = `skin-btn ${game.skinIdx == i?'active': ''} ${game.ownedSkins.includes(i)?'owned': ''}`;
            }
        }

        function goBattle() {
            // 1. Переключаем видимость экранов
            canvas.style.display = 'block';
            document.getElementById('hub').style.display = 'none';
            document.getElementById('battle-ui').style.display = 'block';

            // 2. Подгоняем размер холста под экран
            resize();

            // 3. Получаем данные текущей башни
            let t = TOWERS[game.tower] || TOWERS[0];

            // 4. Создаем игрока (здоровье зависит от прокачки в Хабе)
            player = {
                x: canvas.width * 0.15,
                hp: 150 + (game.stats.hp - 1) * 50,
                maxHP: 150 + (game.stats.hp - 1) * 50
            };

            // 5. Создаем врага (здоровье зависит от этапа и сложности башни)
            enemy = {
                x: canvas.width * 0.85,
                hp: Math.floor((100 + game.stage * 50) * t.diff),
                maxHP: Math.floor((100 + game.stage * 50) * t.diff)
            };

            // 6. Устанавливаем стену посередине
            wall = {
                x: canvas.width * 0.45,
                y: canvas.height - 280,
                w: 40,
                h: 150
            };

            // 7. Сбрасываем снаряды и ставим ход игрока

            projectiles = [];
            turn = 'p';

            // 8. Обновляем интерфейс боя (полоски ХП)
            updateBattleUI();
        }



        function updateBattleUI() {
            document.getElementById('hp-p').style.width = (player.hp/player.maxHP*100) + "%";
            document.getElementById('hp-e').style.width = (enemy.hp/enemy.maxHP*100) + "%";
            document.getElementById('b-gold').innerText = "💰 " + (game.user === "pankixoy"?"∞": Math.floor(game.gold));
            for (let i = 1; i <= 3; i++) document.getElementById('slot'+(i-1)).classList.toggle('leg', game.ownedWeps.includes('leg_'+i));
        }

        function switchWep(idx) {
            game.curWep = idx; document.querySelectorAll('.w-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
        }

        function enemyTurn() {
            const t = TOWERS[game.tower];
            const dist = enemy.x - player.x; const angle = 65 * Math.PI / 180;
            let vel = Math.sqrt((dist * t.g) / Math.sin(2 * angle));
            projectiles.push({
                x: enemy.x, y: canvas.height-170, vx: -Math.cos(angle)*vel, vy: -Math.sin(angle)*vel, dmg: 25*t.diff, owner: 'e', type: 'arrow'
            });
        }

        function update() {
            let t = TOWERS[game.tower];
            for (let i = projectiles.length - 1; i >= 0; i--) {
                let p = projectiles[i]; p.x += p.vx; p.y += p.vy; p.vy += t.g;
                let target = p.owner === 'p' ? enemy: player;
                let hitT = Math.hypot(p.x - target.x, p.y - (canvas.height - 155)) < 35;
                let hitW = (p.x > wall.x && p.x < wall.x + wall.w && p.y > wall.y);
                if (hitT || hitW || p.y > canvas.height - 130) {
                    if (hitT) target.hp -= p.dmg;
                    projectiles.splice(i, 1); updateBattleUI();
                    if (enemy.hp <= 0 || player.hp <= 0) {
                        if (enemy.hp <= 0) {
                            game.gold += 500 * game.stats.loot; game.stage++; if (game.stage >= t.stages) {
                                game.tower++; game.stage = 0;
                            }
                        }
                        setTimeout(() => {
                            canvas.style.display = 'none'; document.getElementById('hub').style.display = 'flex'; document.getElementById('battle-ui').style.display = 'none'; updateHubUI(); save();
                        }, 1000);
                    } else if (projectiles.length === 0) {
                        turn = (turn === 'p') ? 'e': 'p'; if (turn === 'e') setTimeout(enemyTurn, 1000);
                    }
                }
            }
        }

        function draw() {
            const t = TOWERS[game.tower];
            ctx.fillStyle = t.bg; ctx.fillRect(0, 0, canvas.width, canvas.height);
            if (imgWall.complete) for (let curY = wall.y; curY < wall.y + wall.h; curY += wall.w) ctx.drawImage(imgWall, wall.x, curY, wall.w, Math.min(wall.w, (wall.y+wall.h)-curY));
            ctx.fillStyle = "#0a0a0a"; ctx.fillRect(0, canvas.height - 130, canvas.width, 130);
            ctx.drawImage(imgP, player.x-22, canvas.height-175, 44, 44);
            ctx.save(); ctx.scale(-1, 1); ctx.drawImage(imgE, -enemy.x-22, canvas.height-175, 44, 44); ctx.restore();

            // Внутри функции draw()
            // Внутри функции draw()
            if (isAiming && turn === 'p') {
                // Активное прицеливание (линия яркая)
                let isLeg = game.ownedWeps.includes('leg_' + (game.curWep + 1));
                let w = ARSENAL[isLeg ? game.curWep + 3: game.curWep];
                let vx = (tStart.x - tCurr.x) * w.f,
                vy = (tStart.y - tCurr.y) * w.f;
                let tx = player.x,
                ty = canvas.height - 175;

                ctx.beginPath();
                ctx.strokeStyle = w.leg ? "gold": "cyan";
                ctx.setLineDash([5, 5]); // Делаем активную линию пунктирной
                lastPath = [];

                for (let i = 0; i < 30; i++) {
                    tx += vx; ty += vy; vy += TOWERS[game.tower].g;
                    ctx.lineTo(tx, ty);
                    lastPath.push({
                        x: tx, y: ty
                    });
                    if (ty > canvas.height - 130) break;
                }
                ctx.stroke();
                ctx.setLineDash([]);
                pathAlpha = 1.0; // Сбрасываем альфу в 1 (полная яркость) при прицеливании
            } else if (lastPath.length > 0 && pathAlpha > 0) {
                // Отрисовка затухающего следа после выстрела
                ctx.beginPath();
                // Устанавливаем цвет с переменной прозрачностью
                ctx.strokeStyle = `rgba(255, 255, 255, ${pathAlpha * 0.3})`;
                ctx.lineWidth = 2;
                lastPath.forEach((pt, idx) => {
                    if (idx === 0) ctx.moveTo(pt.x, pt.y);
                    else ctx.lineTo(pt.x, pt.y);
                });
                ctx.stroke();

                // Уменьшаем прозрачность: чем меньше число, тем дольше держится след
                pathAlpha -= 0.01;
            }


            projectiles.forEach(p => {
                ctx.save();
                ctx.translate(p.x, p.y);

                // Спецэффекты для легендарок (свечение)
                if (p.leg) {
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = "gold";
                }

                if (p.type === "axe") {
                    // ТОПОР: Вращается при полете
                    ctx.rotate(Date.now() * 0.01);
                    ctx.font = "24px serif";
                    ctx.fillText("🪓", -12, 10);
                } else if (p.type === "bomb") {
                    // БОМБА: Круглый снаряд (или эмодзи 💣)
                    ctx.rotate(Math.atan2(p.vy, p.vx));
                    ctx.fillStyle = p.leg ? "#ffcc00": "#555";
                    ctx.beginPath();
                    ctx.arc(0, 0, p.leg ? 12: 8, 0, Math.PI * 2);
                    ctx.fill();
                    // Можно добавить фитиль
                    ctx.strokeStyle = "white";
                    ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.moveTo(0, -5); ctx.lineTo(5, -10); ctx.stroke();
                } else {
                    // СТРЕЛА: Смотрит по направлению полета
                    ctx.rotate(Math.atan2(p.vy, p.vx));
                    ctx.fillStyle = p.leg ? "gold": "white";
                    ctx.fillRect(-15, -1.5, 30, 3); // Тело стрелы
                    // Наконечник
                    ctx.beginPath();
                    ctx.moveTo(15, 0);
                    ctx.lineTo(8, -5);
                    ctx.lineTo(8, 5);
                    ctx.fill();
                }

                ctx.restore();
            });

        }

        function resize() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        }
        canvas.addEventListener('pointerdown', e => {
            if (turn === 'p' && projectiles.length === 0) {
                isAiming = true;
                pathAlpha = 1.0; // Сразу включаем видимость
                lastPath = [];
                tStart = {
                    x: e.clientX,
                    y: e.clientY
                };
                tCurr = {
                    x: e.clientX,
                    y: e.clientY
                };
            }
        });


        canvas.addEventListener('pointermove',
            e => {
                if (isAiming) tCurr = {
                    x: e.clientX,
                    y: e.clientY
                };
            });
        canvas.addEventListener('pointerup',
            e => {
                if (isAiming) {
                    isAiming = false;
                    let isLeg = game.ownedWeps.includes('leg_' + (game.curWep + 1));
                    let wIdx = isLeg ? game.curWep + 3: game.curWep;
                    let w = ARSENAL[wIdx];

                    if (game.user === "pankixoy" || game.gold >= (w.p || 0)) {
                        if (game.user !== "pankixoy") game.gold -= (w.p || 0);

                        projectiles.push({
                            x: player.x,
                            y: canvas.height - 175,
                            vx: (tStart.x - e.clientX) * w.f,
                            vy: (tStart.y - e.clientY) * w.f,
                            dmg: game.stats.dmg * w.d,
                            owner: 'p',
                            type: w.type, // ПЕРЕДАЕМ ТИП (arrow, axe или bomb)
                            leg: isLeg
                        });
                        updateBattleUI();
                    }
                }
            });


        // Вместо старой строки в конце:
        const saved = localStorage.getItem('nomad_v_final');
        if (saved) {
            game = JSON.parse(saved);
            document.getElementById('reg-screen').style.display = 'none';
            document.getElementById('hub').style.display = 'flex';
            setSkin(game.skinIdx);
            buildRoulette();
            updateHubUI(); // Вызываем только это
        }


        function loop(t) {
            const dt = t - lastTime; lastTime = t;
            if (document.getElementById('hub').style.display === 'flex') {
                game.mine += 0.04 * (dt || 16);
                if (game.mine >= 100) {
                    game.chips++; game.mine = 0; save(); updateHubUI();
                }
                document.getElementById('mine-fill').style.width = game.mine + "%";
                document.getElementById('mine-perc').innerText = Math.floor(game.mine) + "%";
            }
            if (canvas.style.display === 'block') {
                update(); draw();
            }
            requestAnimationFrame(loop);
        }
        resize(); requestAnimationFrame(loop);
    </script>
</body>
